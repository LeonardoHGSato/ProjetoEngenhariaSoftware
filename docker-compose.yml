# Stack completa para desenvolvimento: banco + backend + frontend.
#
#   docker compose up -d postgres        # só o banco (backend/frontend na máquina)
#   docker compose up --build            # tudo: banco, backend (:8080) e frontend (:3000)
#
# As credenciais usam valores padrão (trackfibra/trackfibra/trackfibra) que
# batem com o backend/src/main/resources/application.properties.exemplo.
# Para sobrescrever, copie .env.example para .env e ajuste os valores.

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: trackfibra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackfibra}
      POSTGRES_USER: ${POSTGRES_USER:-trackfibra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackfibra}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trackfibra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackfibra} -d ${POSTGRES_DB:-trackfibra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trackfibra-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-trackfibra}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-trackfibra}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-trackfibra}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_JWT_SECRET_KEY: ${APP_JWT_SECRET_KEY:-troque_por_uma_chave_secreta_com_pelo_menos_256_bits}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend/trackfibra
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: trackfibra-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  trackfibra_pgdata:
