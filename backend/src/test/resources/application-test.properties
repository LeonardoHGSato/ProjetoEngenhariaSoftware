# Usa o H2 em memória
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Pede pro Hibernate criar as tabelas do zero na memória e apagar no final
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Desativa o Flyway nos testes para não dar conflito com o H2
spring.flyway.enabled=false

# Variáveis falsas necessárias para o Contexto do Spring iniciar
app.jwt.secret-key=chave-super-secreta-falsa-apenas-para-os-testes-passarem-123
app.jwt.expiration-time=86400000
app.cors.allowed-origins=*