spring.application.name=TrackFibraBackEnd

#Conexão com o banco
spring.datasource.url=jdbc:postgresql://localhost:5432/provedordb
spring.datasource.username=postgres
spring.datasource.password=4747
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA
spring.jpa.show-sql=true
