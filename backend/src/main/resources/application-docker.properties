# Perfil usado pela imagem Docker do backend (SPRING_PROFILES_ACTIVE=docker).
# A conexao e os segredos vem de variaveis de ambiente, com defaults que batem
# com o docker-compose.yml (servico "postgres" na rede do compose).

# Conexao com o banco
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/trackfibra}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:trackfibra}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trackfibra}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret-key=${APP_JWT_SECRET_KEY:troque_por_uma_chave_secreta_com_pelo_menos_256_bits}
app.jwt.expiration-time=${APP_JWT_EXPIRATION_TIME:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
